name: Create image from template

on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Package name (must exist in nixpkgs)'
        required: true
        type: string
      description:
        description: 'Description (auto-detected from nixpkgs if blank)'
        required: false
        type: string
      ports:
        description: 'Comma-separated ports (e.g. 8080,6881)'
        required: false
        type: string
      volumes:
        description: 'Comma-separated volumes (e.g. /config,/data)'
        required: false
        type: string
      env:
        description: 'Comma-separated env vars (e.g. KEY=value,KEY2=value2)'
        required: false
        type: string
      cmd_args:
        description: 'Comma-separated extra command args (e.g. -data=/config,-nobrowser)'
        required: false
        type: string

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main

      - name: Validate package exists in nixpkgs
        run: |
          nix eval nixpkgs#${{ inputs.name }}.meta.description --raw --impure

      - name: Install jinja2
        run: pip install jinja2

      - name: Check repo does not already exist
        run: |
          if gh repo view ${{ github.repository_owner }}/${{ inputs.name }} &>/dev/null; then
            echo "::error::Repository ${{ github.repository_owner }}/${{ inputs.name }} already exists"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create new repository
        id: repo
        run: |
          gh repo create ${{ github.repository_owner }}/${{ inputs.name }} --private --clone target
          echo "target_dir=$(pwd)/target" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Render templates into new repo
        run: python render.py
        env:
          INPUT_NAME: ${{ inputs.name }}
          INPUT_DESCRIPTION: ${{ inputs.description }}
          INPUT_PORTS: ${{ inputs.ports }}
          INPUT_VOLUMES: ${{ inputs.volumes }}
          INPUT_ENV: ${{ inputs.env }}
          INPUT_CMD_ARGS: ${{ inputs.cmd_args }}
          OUTPUT_DIR: ${{ steps.repo.outputs.target_dir }}

      - name: Show rendered files
        run: |
          echo "=== flake.nix ===" && cat target/flake.nix
          echo "=== compose.yml ===" && cat target/compose.yml
          echo "=== README.md ===" && cat target/README.md

      - name: Commit and push
        working-directory: target
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "feat: initialize ${{ inputs.name }} image from template"
          git push
