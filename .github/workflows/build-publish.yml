name: Build & Publish

permissions:
  contents: write
  packages: write

on:
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild current version'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false

      - name: Get current <%= name %> version from nixpkgs
        id: version
        run: |
          VERSION=$(nix eval .#<%= name %>Version --raw --impure)
          echo "new_version=$VERSION" >> $GITHUB_OUTPUT
      - name: Check if version already exists or force rebuild requested
        id: check
        run: |
          FORCE=${{ github.event.inputs.force_rebuild == 'true' }}
          if [ "$FORCE" = "true" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          NEW_VERSION=${{ steps.version.outputs.new_version }}
          if docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$NEW_VERSION > /dev/null 2>&1; then
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Build and load image
        run: nix run .#<%= name %>-image.copyToDockerDaemon --impure
      - name: Tag and push
        run: |
          VERSION="${{ needs.check-version.outputs.new_version }}"
          docker tag <%= name %>:latest ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}-${{ matrix.arch }}
          docker tag <%= name %>:latest ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-${{ matrix.arch }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}-${{ matrix.arch }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-${{ matrix.arch }}

  create-manifest:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Create multi-arch manifest
        run: |
          VERSION="${{ needs.check-version.outputs.new_version }}"
          docker manifest create ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION} \
            --amend ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}-amd64 \
            --amend ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}-arm64
          docker manifest push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}

          docker manifest create ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            --amend ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-amd64 \
            --amend ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-arm64
          docker manifest push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  test:
    needs: [check-version, create-manifest]
    runs-on: ubuntu-latest
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Pull and test image
        run: |
          VERSION="${{ needs.check-version.outputs.new_version }}"
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}
          docker run -d --name test-container ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}
          sleep 5
          STATUS=$(docker inspect -f '{{.State.Status}}' test-container)
          if [ "$STATUS" = "exited" ]; then
            echo "::error::Container exited immediately"
            docker logs test-container 2>&1 || true
            exit 1
          fi
          echo "Container is $STATUS"

  release:
    needs: [check-version, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.check-version.outputs.new_version }}"
          gh release create "${VERSION}" \
            --repo ${{ github.repository }} \
            --title "${VERSION}" \
            --notes "<%= name %> ${VERSION}"
